name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  binary:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/gatekeeper-linux-amd64 ./cmd/gatekeeper
          GOOS=darwin GOARCH=amd64 go build -o dist/gatekeeper-darwin-amd64 ./cmd/gatekeeper
          GOOS=darwin GOARCH=arm64 go build -o dist/gatekeeper-darwin-arm64 ./cmd/gatekeeper
          GOOS=windows GOARCH=amd64 go build -o dist/gatekeeper-windows-amd64.exe ./cmd/gatekeeper

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*
